[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deepslate-pipecat"
version = "0.1.0"
description = "Pipecat plugin for deepslate.eu"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "deepslate-core",
    "pipecat-ai>=0.0.40",
    "loguru>=0.7.2",
    "websockets>=16.0",
]
keywords = ["voice", "ai", "realtime", "audio", "pipecat", "deepslate"]
classifiers = [
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3 :: Only",
]

[project.urls]
Documentation = "https://docs.deepslate.eu/"
Website = "https://deepslate.eu/"
Source = "https://github.com/deepslate-labs/deepslate-sdks"

[tool.hatch.build.targets.wheel]
packages = ["src/deepslate_pipecat"]

[tool.uv.sources]
deepslate-core = { workspace = true }